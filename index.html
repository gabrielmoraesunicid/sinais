<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sinais Vitais</title>

<style>

body{
font-family: Arial;
margin:0;
background:#eef6fb;
}

header{
background:#2f80ed;
color:white;
text-align:center;
padding:16px;
font-size:20px;
font-weight:bold;
}

.formulario{
background:white;
margin:10px;
padding:18px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

label{
display:block;
margin-top:12px;
font-weight:bold;
}

input{
width:100%;
padding:13px;
margin-top:6px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

.pressao{
display:flex;
gap:10px;
}

.pressao input{
flex:1;
}

button{
width:100%;
padding:16px;
margin-top:18px;
font-size:18px;
background:#27ae60;
color:white;
border:none;
border-radius:8px;
}

.registros{
margin:10px;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
font-size:14px;
}

th{
background:#d6eaf8;
}

.excluir{
background:#e74c3c;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
}

footer{
text-align:center;
font-size:12px;
color:#666;
padding:12px;
}

</style>

</head>

<body>

<header>
Registro de Sinais Vitais
</header>

<div class="formulario">

<label>Frequência Cardíaca (bpm)</label>
<input id="fc" type="number" inputmode="numeric">

<label>Pressão Arterial</label>

<div class="pressao">
<input id="pas" type="number" inputmode="numeric" placeholder="Sistólica">
<input id="pad" type="number" inputmode="numeric" placeholder="Diastólica">
</div>

<label>Temperatura (°C)</label>
<input id="temp" type="number" step="0.1" inputmode="decimal">

<label>Frequência Respiratória</label>
<input id="fr" type="number" inputmode="numeric">

<label>Nível de Dor (0-10)</label>
<input id="dor" type="number" min="0" max="10" inputmode="numeric">

<button onclick="salvar()">Salvar Registro</button>

</div>

<div class="registros">

<table>

<thead>
<tr>
<th>Data</th>
<th>FC</th>
<th>PA</th>
<th>T</th>
<th>FR</th>
<th>Dor</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</div>

<footer>
Sistema simples de registro clínico
</footer>

<script>

let registros = JSON.parse(localStorage.getItem("registrosVitais")) || []

function mostrar(){

const tabela = document.getElementById("lista")
tabela.innerHTML=""

registros.forEach((r,index) => {

let linha = `
<tr>
<td>${r.data}</td>
<td>${r.fc}</td>
<td>${r.pa}</td>
<td>${r.temp}</td>
<td>${r.fr}</td>
<td>${r.dor}</td>
<td>
<button class="excluir" onclick="excluir(${index})">🗑</button>
</td>
</tr>
`

tabela.innerHTML += linha

})

}

function salvar(){

let fc = document.getElementById("fc").value
let pas = document.getElementById("pas").value
let pad = document.getElementById("pad").value
let temp = document.getElementById("temp").value
let fr = document.getElementById("fr").value
let dor = document.getElementById("dor").value

if(!fc || !pas || !pad || !temp || !fr || !dor){
alert("Preencha todos os campos")
return
}

let registro = {

data: new Date().toLocaleString(),

fc: fc,

pa: pas + "/" + pad,

temp: temp,

fr: fr,

dor: dor

}

registros.push(registro)

localStorage.setItem("registrosVitais", JSON.stringify(registros))

document.getElementById("fc").value=""
document.getElementById("pas").value=""
document.getElementById("pad").value=""
document.getElementById("temp").value=""
document.getElementById("fr").value=""
document.getElementById("dor").value=""

mostrar()

}

function excluir(index){

if(confirm("Deseja apagar este registro?")){

registros.splice(index,1)

localStorage.setItem("registrosVitais", JSON.stringify(registros))

mostrar()

}

}

mostrar()

</script>

</body>

</html>
